<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AuroTech Water Solutions</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">



    {% load static %}
    <!-- Simple Styling -->
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }


        /* Navbar */
        .navbar {
            background: #0D1664;
            height: 80px;
            padding: 10px 0 0 0;            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
        }

        /* Logo container — flexible */
        .logo {
            height: 100%;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            flex: 0 0 40%;             /* <-- exactly 40% of navbar width */
        }

        /* Logo image — fills container */
        .logo img {
            height: 100%;               /* match navbar height */
            width: 100%;                /* fill container horizontally */
            object-fit: contain;        /* maintain proportions */
        }             /* optional maximum width */
        
        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }

        .hero {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                        url("https://images.unsplash.com/photo-1506744038136-46273834b3fb");
            background-size: cover;
            background-position: center;
            height: 90vh;
            color: white;
            display: flex;
            align-items: center;
            padding: 0 60px;
        }

        .hero-content {
            max-width: 600px;
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            margin-right: 15px;
            margin-top: 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 600;
        }

        .btn-primary {
            
            color: white;
        }

        .btn-outline {
            border: 2px solid white;
            color: white;
        }

        .section {
            background-color: #169eb9;
            padding: 10px 60px;
            text-align: center;
        }

        .products {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 30px;
        }

        .card {
            width: 300px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-radius: 10px;
        }

        footer {
            background: #03045E;
            color: white;
            padding: 40px;
            text-align: center;
        }





        /* CORE PRODUCTS GRID */
.products-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr); /* 5 products per row on desktop */
    grid-template-rows: repeat(2, auto);  /* exactly 2 rows */
    gap: 25px;
    align-items: stretch;
}

/* Product card style */
.product-card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    text-align: center;
    height: 300px;

}

.product-card h5 {
    font-weight: normal;
}

.view-more-btn {
    display: inline-block;
    padding: 10px 18px;
    background: #007bff;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-size: 14px;
    transition: 0.3s ease;
}

.view-more-btn:hover {
    background: #0056b3;
}

/* Tablet */
@media (max-width: 1200px) {
    .products-grid {
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(4, auto); /* wrap 10 items into 4 rows */
    }
}

/* Mobile */
@media (max-width: 768px) {
    .products-grid {
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(5, auto); /* 10 items / 2 per row */
    }
}

.products-grid .product-card img {
    width: 100%;        /* make it fit the container width */
    max-width: 300px;   /* limit maximum width */
    height: 120px;      /* fixed height */
    object-fit: cover;  /* crop/fit the image nicely without distortion */
    border-radius: 8px; /* optional: rounded corners */
}

.product-link {
    text-decoration: none; /* remove underline */
    color: inherit;        /* keep text color */
}

.product-link:hover .product-card {
    transform: translateY(-5px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    transition: 0.3s;
    cursor: pointer;
}
.cta-section {
    text-align: center;
    padding: 60px 20px;
    background: #CAF0F8;
}

.cta-section h2 {
    margin-bottom: 10px;
    font-size: 32px;
}

.cta-section p {
    margin-bottom: 25px;
    font-size: 18px;
}

.btn-primary {
    display: inline-block;
    padding: 12px 25px;
    background-color: #0d1b2a;
    color: #fff;
    text-decoration: none;
    border-radius: 5px;
    font-weight: 600;
}

.btn-primary:hover {
    background-color: #1b263b;
}
.btn-secondary {
    display: inline-block;
    padding: 12px 25px;
    background-color: #0d1b2a;
    color: #fff;
    text-decoration: none;
    border-radius: 5px;
    font-weight: 600;
}
.btn-secondary:hover {
    background-color: #1b263b;
}
.footer-section {
    background-color: #0D1664;
}

.footer-section a {
    color: #fff;
}

    </style>
</head>
<body>








    <!-- NAVBAR -->
    <div class="navbar">
       <h2 class="logo">
            <img src="{% static 'images/products/ASL.PNG' %}" alt="AuroTech Logo">
         
        </h2>
        <div>
            <a href="{% url 'all_products' %}">All Products</a>
            <a href="#">Services</a>
            <a href="#">Industries</a>
            <a href="{% url 'about_us' %}">About Us</a>
            <a href="{% url 'contact' %}">Contact</a>
            <form method="GET" action="{% url 'search_products' %}" style="display:inline-block; margin-left:20px;">
                <input type="text" name="q" placeholder="Search products..." 
                    style="padding:6px 10px; border-radius:6px; border:1px solid #ccc;">
                <button type="submit" 
                        style="padding:6px 12px; border:none; background:#007bff; color:white; border-radius:6px;">
                    Search
                </button>
            </form>
        </div>
    </div>

    {% block content %}
    {% endblock %}

    <footer>

        <!-- Contact Info -->
        <div class="footer-section">
            <h4>Contact Us</h4>
            <p> +254 795 037 347</p>
            <p> <a href="mailto:auratechltd@gmail.com">auratechltd@gmail.com</a></p>
            <p> Nairobi, Kenya</p>
        </div>
        <p>© 2026 AuroTech Solutions Limited | Purity in Every Element.</p>
    </footer>


    
</body>
</html>
