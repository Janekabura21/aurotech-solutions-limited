<style>

.core-products-container {
    display: flex;
    flex-direction: column;   /* THIS makes them vertical */
    gap: 25px;
    max-width: 1000px;
    margin: 50px auto;
}

.core-product-card {
    display: block;
    padding: 25px;
    border-radius: 12px;
    background: #ffffff;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    transition: 0.3s ease;
}

.core-product-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 24px rgba(0,0,0,0.12);
}

.core-product-card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 15px;
}

.core-product-info h2 {
    margin-bottom: 10px;
}

.core-product-link {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 18px;
    background: #007bff;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    transition: 0.3s ease;
}

.core-product-link:hover {
    background: #0056b3;
}

</style>


<div class="core-products-container">

    {% for core in core_products %}
        <div class="core-product-card">

            {% if core.image %}
                <img src="{{ core.image.url }}" alt="{{ core.name }}">
            {% endif %}

            <h2>{{ core.name }}</h2>

            <p>{{ core.description|truncatewords:20 }}</p>

            <a href="{% url 'core_product_detail' core.slug %}" 
               class="core-product-link">
                View Products
            </a>

        </div>
    {% endfor %}

</div>
