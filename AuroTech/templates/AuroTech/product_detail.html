{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="product-detail">
    
    <h1>{{ product.name }}</h1>
    <img src="{{ product.image.url }}" alt="{{ product.name }}">
    <p>{{ product.description }}</p>
    <p>Price: ${{ product.price }}</p>
    <a href="{{ product.core_product.get_absolute_url }}">Back to {{ product.core_product.name }}</a>

</div>
{% endblock %}
